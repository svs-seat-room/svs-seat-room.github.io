<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026/06/20 SVS Seating Proposal</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #5b6773;
      --line: #d8dee6;
      --cyan: #8ee9ff;
      --orange: #ffd29a;
      --red: #ef233c;
      --red-soft: #fff1f2;
      --warn: #b45309;
      --warn-soft: #fff7ed;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: var(--ink);
    }

    header {
      padding: 16px 18px 10px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .bar {
      max-width: 1160px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .topline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 3vw, 30px);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .status {
      display: inline-flex;
      padding: 6px 10px;
      border: 1px solid #d97706;
      color: #92400e;
      background: var(--warn-soft);
      border-radius: 8px;
      font-weight: 800;
      white-space: nowrap;
    }

    .date {
      white-space: nowrap;
      color: var(--muted);
      font-weight: 800;
      text-align: end;
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    label {
      color: var(--muted);
      font-weight: 700;
    }

    select {
      min-width: 220px;
      padding: 8px 34px 8px 10px;
      border: 1px solid #c4ceda;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 15px;
      font-weight: 700;
    }

    main {
      max-width: 1160px;
      margin: 0 auto;
      padding: 18px;
    }

    .map-wrap {
      position: relative;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .06);
    }

    .map-stage {
      position: relative;
      max-width: 100%;
      overflow: hidden;
      border-radius: 6px;
    }

    .map-stage img {
      display: block;
      width: 100%;
      height: auto;
    }

    .map-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .red-zone {
      fill: none;
      stroke: var(--red);
      stroke-width: 7;
      vector-effect: non-scaling-stroke;
    }

    .gate-box,
    .castle-box {
      fill: #fff;
      stroke: #2b2f33;
      stroke-width: 2;
      vector-effect: non-scaling-stroke;
    }

    .gate-text,
    .castle-text {
      fill: #1f2933;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: central;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .gate-text { font-size: 22px; }
    .castle-text { font-size: 20px; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-weight: 800;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(0, 0, 0, .2);
    }

    .cyan { background: var(--cyan); }
    .orange { background: var(--orange); }
    .red { background: var(--red); }

    .notes {
      margin-top: 14px;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    [dir="rtl"] .date { text-align: start; }

    @media (max-width: 720px) {
      .bar {
        grid-template-columns: 1fr;
      }

      .date {
        text-align: start;
      }

      .controls {
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      select {
        width: 100%;
      }

      main {
        padding: 12px;
      }
    }
  </style>
</head>

      const t = translations[language] || translations.ja;
      document.documentElement.lang = language;
      document.documentElement.dir = language === "ar" ? "rtl" : "ltr";
      document.title = t.title;
      document.querySelectorAll("[data-i18n]").forEach((node) => {

        node.textContent = t[key] || translations.ja[key] || "";

      document.querySelectorAll("[data-svg-i18n]").forEach((node) => {
        const key = node.getAttribute("data-svg-i18n");
        node.textContent = t[key] || translations.ja[key] || "";
      });
      localStorage.setItem("svs-seat-room-language", language);
    }

    selector.addEventListener("change", (event) => applyLanguage(event.target.value));
    applyLanguage(initialLanguage);
