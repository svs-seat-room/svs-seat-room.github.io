<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026/06/20 SVS Seating</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #ffffff;
      color: #1f2933;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .map {
      display: block;
      width: min(100vw, 1488px);
      height: auto;
      margin: 0 auto;
    }
    .panel {
      width: min(100vw, 1488px);
      padding: 10px 14px 18px;
      display: grid;
      gap: 10px;
      border-top: 1px solid #e5e7eb;
      background: #ffffff;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    label {
      font-weight: 800;
      color: #4b5563;
    }
    select {
      min-width: 220px;
      padding: 8px 34px 8px 10px;
      border: 1px solid #c4ceda;
      border-radius: 8px;
      background: #fff;
      color: #1f2933;
      font-size: 15px;
      font-weight: 800;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #fff;
      border: 1px solid #d8dee6;
      border-radius: 999px;
      font-weight: 800;
    }
    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(0, 0, 0, .2);
    }
    .cyan { background: #8ee9ff; }
    .orange { background: #ffd29a; }
    .red { background: #ef233c; }
    .notes {
      display: grid;
      gap: 6px;
      color: #5b6773;
      font-size: 14px;
      line-height: 1.6;
    }
    [dir="rtl"] .panel,
    [dir="rtl"] .controls,
    [dir="rtl"] .legend {
      direction: rtl;
    }
    @media (max-width: 720px) {
      .panel { padding: 10px 12px 16px; }
      .controls, select { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <img class="map" src="assets/2026-06-20-svs-seating-v15.png" alt="2026/06/20 SVS seating proposal">

    <section class="panel" aria-label="Information">
      <div class="controls">
        <label for="language" data-i18n="languageLabel">表示言語</label>
        <select id="language" aria-label="Language">
          <option value="ja">日本語</option>
          <option value="en">English</option>
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁體中文</option>
          <option value="ko">한국어</option>
          <option value="ar">العربية</option>
          <option value="es">Español</option>
          <option value="pt-BR">Português</option>
          <option value="ru">Русский</option>
          <option value="id">Bahasa Indonesia</option>
          <option value="th">ไทย</option>
          <option value="vi">Tiếng Việt</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="tr">Türkçe</option>
        </select>
      </div>

      <div class="legend" aria-label="Legend">
        <span class="chip"><span class="swatch cyan"></span><span data-i18n="sideA">3301側: 80席</span></span>
        <span class="chip"><span class="swatch orange"></span><span data-i18n="sideB">3323側: 80席</span></span>
        <span class="chip"><span class="swatch red"></span><span data-i18n="redZone">外周レッドゾーン</span></span>
      </div>

      <div class="notes">
        <div data-i18n="note1">このページは、配席案とルール確認のための閲覧専用ページです。</div>
        <div data-i18n="note2">水色・橙色のマスは各80席です。中央空白と東西南北まわりの座れないマスは配席対象外です。</div>
        <div data-i18n="note3">上の配置図は確定前の提案です。画像の表示を正式な配席図として確認してください。</div>
      </div>
    </section>
  </main>

  <script>

        note3: "الخريطة أعلاه اقتراح قبل الاتفاق النهائي. يرجى اعتماد الصورة نفسها كمرجع رسمي للمقاعد."
      },
      es: {

      },
      th: {
        languageLabel: "ภาษา",
        sideA: "ฝั่ง 3301: 80 ที่นั่ง",
        sideB: "ฝั่ง 3323: 80 ที่นั่ง",
        redZone: "เขตแดงรอบนอก",
        note1: "หน้านี้เป็นหน้าอ่านอย่างเดียวสำหรับตรวจสอบผังที่นั่งและกติกา",
        note2: "พื้นที่สีฟ้าและสีส้มมีฝั่งละ 80 ที่นั่ง พื้นที่ว่างกลางและช่องที่นั่งไม่ได้รอบทิศทั้งสี่จะไม่นับรวม",
        note3: "แผนผังด้านบนเป็นข้อเสนอก่อนสรุป โปรดใช้ภาพนี้เป็นเอกสารอ้างอิงที่นั่งอย่างเป็นทางการ"

      vi: {
        languageLabel: "Ngon ngu",
        sideA: "Phe 3301: 80 cho",
        sideB: "Phe 3323: 80 cho",

        note1: "Trang nay chi de xem de xuat cho ngoi va xac nhan quy tac.",
        note2: "Khu mau xanh va cam moi khu co 80 cho. Khu trong o giua va cac o khong the ngoi quanh bon huong khong duoc tinh.",
        note3: "Ban do phia tren la de xuat truoc khi thong nhat cuoi cung. Hay dung chinh hinh anh lam tai lieu tham chieu chinh thuc."
      },
      fr: {
        languageLabel: "Langue",
        sideA: "Cote 3301: 80 places",
        sideB: "Cote 3323: 80 places",
        redZone: "Zone rouge exterieure",
        note1: "Cette page est en lecture seule pour verifier le plan de placement et les regles.",
        note2: "Les zones cyan et orange contiennent chacune 80 places. La zone centrale vide et les cases indisponibles autour des quatre directions ne sont pas incluses.",
        note3: "La carte ci-dessus est une proposition avant accord final. Utilisez l'image elle-meme comme reference officielle."
      },
      de: {
        languageLabel: "Sprache",
        sideA: "Seite 3301: 80 Plaetze",
        sideB: "Seite 3323: 80 Plaetze",
        redZone: "Aeussere rote Zone",
        note1: "Diese Seite ist nur zur Ansicht des Sitzplans und zur Regelbestaetigung gedacht.",
        note2: "Die cyanfarbenen und orangefarbenen Bereiche enthalten jeweils 80 Plaetze. Der freie Mittelbereich und die nicht verfuegbaren Felder um die vier Richtungen sind nicht enthalten.",

      }
    };

    const select = document.getElementById("language");
    function applyLanguage(lang) {
      const dict = translations[lang] || translations.ja;
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (dict[key]) el.textContent = dict[key];
      });
      localStorage.setItem("svs-seat-room-language", lang);
    }
    select.addEventListener("change", () => applyLanguage(select.value));
    const saved = localStorage.getItem("svs-seat-room-language") || "ja";
    if (translations[saved]) select.value = saved;
    applyLanguage(select.value);
  </script>
</body>
</html>
