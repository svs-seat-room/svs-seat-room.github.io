<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026/06/20 SVS配席</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #ffffff;
      color: #1f2933;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
    }

    .map {
      display: block;
      width: min(100vw, 1488px);
      height: auto;
      margin: 0 auto;
    }

    .panel {
      width: min(100vw, 1488px);
      padding: 10px 14px 18px;
      display: grid;
      gap: 10px;
      border-top: 1px solid #e5e7eb;
      background: #ffffff;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    label {
      font-weight: 800;
      color: #4b5563;
    }

    select {
      min-width: 220px;
      padding: 8px 34px 8px 10px;
      border: 1px solid #c4ceda;
      border-radius: 8px;
      background: #fff;
      color: #1f2933;
      font-size: 15px;
      font-weight: 800;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #fff;
      border: 1px solid #d8dee6;
      border-radius: 999px;
      font-weight: 800;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(0, 0, 0, .2);
    }

    .cyan { background: #8ee9ff; }
    .orange { background: #ffd29a; }
    .red { background: #ef233c; }

    .notes {
      display: grid;
      gap: 6px;
      color: #5b6773;
      font-size: 14px;
      line-height: 1.6;
    }

    [dir="rtl"] .panel,
    [dir="rtl"] .controls,
    [dir="rtl"] .legend {
      direction: rtl;
    }

    @media (max-width: 720px) {
      .panel { padding: 10px 12px 16px; }
      .controls, select { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <img class="map" src="assets/2026-06-20-svs-seating.png" alt="2026/06/20 SVS seating proposal">

    <section class="panel" aria-label="Information">
      <div class="controls">
        <label for="language" data-i18n="languageLabel">表示言語</label>
        <select id="language" aria-label="Language">
          <option value="ja">日本語</option>
          <option value="en">English</option>
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁體中文</option>
          <option value="ko">한국어</option>
          <option value="ar">العربية</option>
          <option value="es">Español</option>
          <option value="pt-BR">Português</option>
          <option value="ru">Русский</option>
          <option value="id">Bahasa Indonesia</option>
          <option value="th">ไทย</option>
          <option value="vi">Tiếng Việt</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="tr">Türkçe</option>
        </select>
      </div>

      <div class="legend" aria-label="Legend">
        <span class="chip"><span class="swatch cyan"></span><span data-i18n="sideA">3301側: 80席</span></span>
        <span class="chip"><span class="swatch orange"></span><span data-i18n="sideB">3323側: 80席</span></span>
        <span class="chip"><span class="swatch red"></span><span data-i18n="redZone">外周レッドゾーン</span></span>
      </div>

      <div class="notes">
        <div data-i18n="note1">このページは、配席案とルール確認のための閲覧専用ページです。</div>
        <div data-i18n="note2">水色・橙色のマスは各80席です。中央空白と東西南北まわりの座れないマスは配席対象外です。</div>
        <div data-i18n="note3">上の配置図は確定前の提案です。画像内の表示を正式な配席図として確認してください。</div>
      </div>
    </section>
  </main>

  <script>

      },
      "zh-TW": {

        note2: "تحتوي المناطق السماوية والبرتقالية على 80 مقعدا لكل جانب. المنطقة الوسطى والخانات غير المتاحة قرب البوابات غير مشمولة.",
        note3: "الخريطة أعلاه مقترح قبل الاتفاق النهائي. يرجى اعتماد ما يظهر داخل الصورة كمرجع رسمي للمقاعد."

      "id": {

        redZone: "Zona merah luar",

        note2: "Area biru muda dan oranye masing-masing berisi 80 kursi. Area kosong tengah dan sel yang tidak tersedia di dekat gerbang tidak dihitung.",

      },
      "th": {
        languageLabel: "ภาษา",
        sideA: "ฝ่าย 3301: 80 ที่นั่ง",
        sideB: "ฝ่าย 3323: 80 ที่นั่ง",
        redZone: "เขตแดงรอบนอก",
        note1: "หน้านี้เป็นหน้าอ่านอย่างเดียวสำหรับตรวจสอบที่นั่งและกฎ",
        note2: "พื้นที่สีฟ้าและสีส้มมีฝ่ายละ 80 ที่นั่ง พื้นที่ว่างกลางและช่องที่นั่งไม่ได้ใกล้ประตูจะไม่ถูกนับ",
        note3: "แผนที่ด้านบนเป็นข้อเสนอก่อนสรุป โปรดใช้ภาพนี้เป็นข้อมูลอ้างอิงที่นั่งอย่างเป็นทางการ"
      },
      "vi": {
        languageLabel: "Ngon ngu",
        sideA: "Phe 3301: 80 cho",
        sideB: "Phe 3323: 80 cho",

        note1: "Trang nay chi de xem de xuat cho ngoi va xac nhan quy tac.",
        note2: "Khu mau xanh va cam moi khu co 80 cho. Khu trong o giua va cac o khong the ngoi gan cong khong duoc tinh.",
        note3: "Ban do phia tren la de xuat truoc khi chot. Hay dung noi dung trong anh lam tham chieu chinh thuc."
      },
      "fr": {
        languageLabel: "Langue",
        sideA: "Cote 3301 : 80 places",
        sideB: "Cote 3323 : 80 places",
        redZone: "Zone rouge exterieure",
        note1: "Cette page est en lecture seule pour verifier le placement et les regles.",
        note2: "Les zones cyan et orange contiennent chacune 80 places. La zone centrale et les cases indisponibles pres des portes ne sont pas incluses.",
        note3: "La carte ci-dessus est une proposition avant accord final. Utilisez l'image comme reference officielle de placement."
      },
      "de": {
        languageLabel: "Sprache",
        sideA: "3301-Seite: 80 Sitze",
        sideB: "3323-Seite: 80 Sitze",
        redZone: "Aussere rote Zone",
        note1: "Diese Seite ist nur zur Ansicht der Sitzordnung und Regeln gedacht.",
        note2: "Die cyanfarbenen und orangefarbenen Bereiche enthalten jeweils 80 Sitze. Der mittlere Leerbereich und nicht verfuegbare Felder an den Toren zaehlen nicht.",
        note3: "Die Karte oben ist ein Vorschlag vor der finalen Einigung. Bitte nutzen Sie das Bild selbst als offizielle Sitzreferenz."
      },
      "tr": {
        languageLabel: "Dil",
        sideA: "3301 tarafi: 80 koltuk",
        sideB: "3323 tarafi: 80 koltuk",

        note1: "Bu sayfa koltuk plani ve kurallari kontrol etmek icin salt okunurdur.",
        note2: "Camgobegi ve turuncu alanlarin her biri 80 koltuk icerir. Orta bos alan ve kapilarin yanindaki kullanilamaz hucreler dahil degildir.",

    const selector = document.getElementById("language");
    const stored = localStorage.getItem("svs-seat-room-language");
    const initialLanguage = translations[stored] ? stored : "ja";
    selector.value = initialLanguage;

    function applyLanguage(language) {
      const t = translations[language] || translations.ja;
      document.documentElement.lang = language;
      document.documentElement.dir = language === "ar" ? "rtl" : "ltr";
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const key = node.getAttribute("data-i18n");
        node.textContent = t[key] || translations.ja[key] || "";
      });
      localStorage.setItem("svs-seat-room-language", language);
    }

    selector.addEventListener("change", (event) => applyLanguage(event.target.value));
    applyLanguage(initialLanguage);
  </script>
</body>
</html>
