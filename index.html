<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026/06/20 SVS配席</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #5b6773;
      --line: #d8dee6;
      --cyan: #8ee9ff;
      --orange: #ffd29a;
      --red: #ef233c;
      --warn: #b45309;
      --warn-soft: #fff7ed;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: var(--ink);
    }

    header {
      padding: 14px 18px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .bar {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status {
      display: inline-flex;
      padding: 6px 10px;
      border: 1px solid #d97706;
      color: #92400e;
      background: var(--warn-soft);
      border-radius: 8px;
      font-weight: 800;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    label {
      color: var(--muted);
      font-weight: 800;
    }

    select {
      min-width: 220px;
      padding: 8px 34px 8px 10px;
      border: 1px solid #c4ceda;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
    }

    main {
      max-width: 1160px;
      margin: 0 auto;
      padding: 18px;
    }

    .map-wrap {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .06);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-weight: 800;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(0, 0, 0, .2);
    }

    .cyan { background: var(--cyan); }
    .orange { background: var(--orange); }
    .red { background: var(--red); }

    .notes {
      margin-top: 14px;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    [dir="rtl"] .bar,
    [dir="rtl"] .controls,
    [dir="rtl"] .legend {
      direction: rtl;
    }

    @media (max-width: 720px) {
      .bar {
        align-items: stretch;
      }

      .controls,
      select {
        width: 100%;
      }

      main {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <span class="status" data-i18n="status">相手国に提案中（未決定）</span>
      <div class="controls">
        <label for="language" data-i18n="languageLabel">表示言語</label>
        <select id="language" aria-label="Language">
          <option value="ja">日本語</option>
          <option value="en">English</option>
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁體中文</option>
          <option value="ko">한국어</option>
          <option value="ar">العربية</option>
          <option value="es">Español</option>
          <option value="pt-BR">Português</option>
          <option value="ru">Русский</option>
          <option value="id">Bahasa Indonesia</option>
          <option value="th">ไทย</option>
          <option value="vi">Tiếng Việt</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="tr">Türkçe</option>
        </select>
      </div>
    </div>
  </header>

  <main>
    <section class="map-wrap" aria-label="SVS seating map">
      <img src="assets/2026-06-20-svs-seating.png" alt="2026/06/20 SVS seating proposal map">
    </section>

    <div class="legend" aria-label="Legend">
      <span class="chip"><span class="swatch cyan"></span><span data-i18n="sideA">3301側: 80席</span></span>
      <span class="chip"><span class="swatch orange"></span><span data-i18n="sideB">3323側: 80席</span></span>
      <span class="chip"><span class="swatch red"></span><span data-i18n="redZone">外周レッドゾーン</span></span>
    </div>

    <div class="notes">
      <div data-i18n="note1">このページは、配席案とルール確認のための閲覧専用ページです。</div>
      <div data-i18n="note2">水色・橙色のマスは各80席です。中央空白と東西南北まわりの座れないマスは配席対象外です。</div>
    </div>
  </main>

  <script>
    const translations = {
      "ja": {

        redZone: "外周レッドゾーン",
        note1: "このページは、配席案とルール確認のための閲覧専用ページです。",

      },
      "en": {
        status: "Proposed to the opposing side (not final)",
        languageLabel: "Language",
        sideA: "3301 side: 80 seats",
        sideB: "3323 side: 80 seats",

        note2: "Cyan and orange areas each contain 80 seats. The center blank area and unavailable gate-side cells are not included."
      },
      "zh-CN": {
        status: "已向对方提出（未最终确定）",

        redZone: "外圈红区",

        note2: "水色和橙色区域各有80个座位。中央空白区以及四门附近不可坐的位置不计入座位。"
      },
      "zh-TW": {
        status: "已向對方提出（尚未確定）",
        languageLabel: "顯示語言",
        sideA: "3301方：80席",
        sideB: "3323方：80席",
        redZone: "外圈紅區",
        note1: "此頁面僅供查看座位提案與確認規則。",
        note2: "水色與橙色區域各有80席。中央空白區及四門附近不可坐的位置不列入座位。"
      },
      "ko": {

        sideB: "3323 측: 80석",

        note1: "이 페이지는 좌석안과 규칙 확인을 위한 읽기 전용 페이지입니다.",
        note2: "하늘색과 주황색 구역은 각각 80석입니다. 중앙 공백과 사방 게이트 주변의 착석 불가 칸은 제외됩니다."
      },
      "ar": {
        status: "مقترح للطرف المقابل (غير نهائي)",
        languageLabel: "اللغة",
        sideA: "جانب 3301: 80 مقعدا",
        sideB: "جانب 3323: 80 مقعدا",
        redZone: "المنطقة الحمراء الخارجية",
        note1: "هذه الصفحة للعرض فقط من أجل مراجعة المقاعد والقواعد.",
        note2: "تحتوي المناطق السماوية والبرتقالية على 80 مقعدا لكل جانب. المنطقة الوسطى والخانات غير المتاحة قرب البوابات غير مشمولة."
      },

        sideB: "Lado 3323: 80 asientos",

      "ru": {

        note2: "Голубая и оранжевая зоны содержат по 80 мест. Центральная пустая зона и недоступные клетки у ворот не учитываются."
      },
      "id": {

        languageLabel: "Bahasa",
        sideA: "Sisi 3301: 80 kursi",
        sideB: "Sisi 3323: 80 kursi",

        note1: "Halaman ini hanya untuk melihat proposal kursi dan konfirmasi aturan.",
        note2: "Area biru muda dan oranye masing-masing berisi 80 kursi. Area kosong tengah dan sel yang tidak tersedia di dekat gerbang tidak dihitung."
      },
      "th": {
        status: "เสนอให้ฝ่ายตรงข้ามแล้ว (ยังไม่สรุป)",
        languageLabel: "ภาษา",
        sideA: "ฝ่าย 3301: 80 ที่นั่ง",
        sideB: "ฝ่าย 3323: 80 ที่นั่ง",
        redZone: "เขตแดงรอบนอก",
        note1: "หน้านี้เป็นหน้าอ่านอย่างเดียวสำหรับตรวจสอบที่นั่งและกฎ",
        note2: "พื้นที่สีฟ้าและสีส้มมีฝ่ายละ 80 ที่นั่ง พื้นที่ว่างกลางและช่องที่นั่งไม่ได้ใกล้ประตูจะไม่ถูกนับ"
      },
      "vi": {
        status: "Da de xuat cho doi phuong (chua chot)",
        languageLabel: "Ngon ngu",
        sideA: "Phe 3301: 80 cho",
        sideB: "Phe 3323: 80 cho",
        redZone: "Vung do ben ngoai",
        note1: "Trang nay chi de xem de xuat cho ngoi va xac nhan quy tac.",
        note2: "Khu mau xanh va cam moi khu co 80 cho. Khu trong o giua va cac o khong the ngoi gan cong khong duoc tinh."
      },
      "fr": {
        status: "Propose a l'adversaire (non final)",
        languageLabel: "Langue",
        sideA: "Cote 3301 : 80 places",
        sideB: "Cote 3323 : 80 places",
        redZone: "Zone rouge exterieure",
        note1: "Cette page est en lecture seule pour verifier le placement et les regles.",
        note2: "Les zones cyan et orange contiennent chacune 80 places. La zone centrale et les cases indisponibles pres des portes ne sont pas incluses."
      },
      "de": {
        status: "Dem Gegner vorgeschlagen (nicht final)",
        languageLabel: "Sprache",
        sideA: "3301-Seite: 80 Sitze",
        sideB: "3323-Seite: 80 Sitze",
        redZone: "Aussere rote Zone",
        note1: "Diese Seite ist nur zur Ansicht der Sitzordnung und Regeln gedacht.",
        note2: "Die cyanfarbenen und orangefarbenen Bereiche enthalten jeweils 80 Sitze. Der mittlere Leerbereich und nicht verfuegbare Felder an den Toren zaehlen nicht."
      },
      "tr": {
        status: "Rakip tarafa onerildi (kesin degil)",
        languageLabel: "Dil",
        sideA: "3301 tarafi: 80 koltuk",
        sideB: "3323 tarafi: 80 koltuk",
        redZone: "Dis kirmizi bolge",
        note1: "Bu sayfa koltuk plani ve kurallari kontrol etmek icin salt okunurdur.",
        note2: "Camgobegi ve turuncu alanlarin her biri 80 koltuk icerir. Orta bos alan ve kapilarin yanindaki kullanilamaz hucreler dahil degildir."
      }
    };

    const selector = document.getElementById("language");
    const stored = localStorage.getItem("svs-seat-room-language");
    const initialLanguage = translations[stored] ? stored : "ja";
    selector.value = initialLanguage;

    function applyLanguage(language) {
      const t = translations[language] || translations.ja;
      document.documentElement.lang = language;
      document.documentElement.dir = language === "ar" ? "rtl" : "ltr";
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const key = node.getAttribute("data-i18n");
        node.textContent = t[key] || translations.ja[key] || "";
      });
      localStorage.setItem("svs-seat-room-language", language);
    }

    selector.addEventListener("change", (event) => applyLanguage(event.target.value));
    applyLanguage(initialLanguage);
  </script>
</body>
</html>
